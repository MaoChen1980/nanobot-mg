<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nanobot settings</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f9fafb; color: #111; min-height: 100vh; }
  .container { max-width: 800px; margin: 0 auto; padding: 1rem; }

  header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #e5e7eb; }
  header img { width: 32px; height: 32px; }
  header h1 { font-size: 1.125rem; font-weight: 600; }

  .tabs { display: flex; gap: 0; border-bottom: 2px solid #e5e7eb; margin-bottom: 1.5rem; }
  .tab { padding: 0.5rem 1rem; cursor: pointer; font-size: 0.875rem; font-weight: 500; color: #6b7280; border-bottom: 2px solid transparent; margin-bottom: -2px; }
  .tab:hover { color: #111; }
  .tab.active { color: #3b82f6; border-bottom-color: #3b82f6; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .card { background: white; border: 1px solid #e5e7eb; border-radius: 0.75rem; overflow: hidden; margin-bottom: 1rem; }
  .card-header { padding: 0.75rem 1rem; border-bottom: 1px solid #f3f4f6; font-size: 0.75rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; justify-content: space-between; }
  .card-header .badge { font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 9999px; background: #dbeafe; color: #1d4ed8; font-weight: 500; text-transform: none; letter-spacing: 0; }
  .card-header .badge.enabled { background: #dcfce7; color: #15803d; }
  .row { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; border-bottom: 1px solid #f3f4f6; gap: 1rem; }
  .row:last-child { border-bottom: none; }
  .row label { font-size: 0.875rem; font-weight: 500; min-width: 140px; }
  .row .field { flex: 1; display: flex; justify-content: flex-end; }
  .row input[type="text"],
  .row input[type="number"],
  .row input[type="password"],
  .row select { font-size: 0.875rem; padding: 0.375rem 0.5rem; border: 1px solid #d1d5db; border-radius: 0.375rem; background: white; min-width: 180px; max-width: 100%; }
  .row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
  .row input:focus, .row select:focus { outline: 2px solid #3b82f6; outline-offset: 1px; border-color: #3b82f6; }
  .row .hint { font-size: 0.75rem; color: #9ca3af; }

  .footer { display: flex; align-items: center; justify-content: space-between; padding: 0.875rem 1rem; background: #f9fafb; border-top: 1px solid #e5e7eb; position: sticky; bottom: 0; }
  .msg { font-size: 0.875rem; }
  .msg.ok { color: #16a34a; }
  .msg.err { color: #dc2626; }
  button { font-size: 0.875rem; padding: 0.5rem 1rem; border: 1px solid #d1d5db; border-radius: 0.375rem; background: white; cursor: pointer; }
  button:hover { background: #f9fafb; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.primary { background: #3b82f6; color: white; border-color: #3b82f6; }
  button.primary:hover { background: #2563eb; }

  .loading { display: flex; align-items: center; justify-content: center; min-height: 200px; color: #6b7280; font-size: 0.875rem; }
  .error { padding: 1rem; color: #dc2626; font-size: 0.875rem; }

  .group-title { font-size: 0.8rem; font-weight: 600; color: #374151; padding: 0.5rem 1rem; background: #f9fafb; border-top: 1px solid #e5e7eb; }
  .sub-row { padding-left: 1.5rem; }

  .channel-card { margin-bottom: 0.5rem; }
  .channel-header { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; cursor: pointer; background: #f9fafb; border-bottom: 1px solid #e5e7eb; }
  .channel-header:hover { background: #f3f4f6; }
  .channel-body { padding: 0.75rem 1rem; display: none; }
  .channel-body.open { display: block; }

  .provider-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  @media (max-width: 600px) { .provider-grid { grid-template-columns: 1fr; } }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0; }
  .toggle-row label { font-size: 0.875rem; }
  .toggle { position: relative; width: 36px; height: 20px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .slider { position: absolute; inset: 0; background: #d1d5db; border-radius: 9999px; cursor: pointer; transition: 0.2s; }
  .toggle .slider:before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.2s; }
  .toggle input:checked + .slider { background: #3b82f6; }
  .toggle input:checked + .slider:before { transform: translateX(16px); }

  .masked { font-family: monospace; letter-spacing: 2px; color: #9ca3af; }
</style>
</head>
<body>
<div class="container">
  <header>
    <img src="/brand/nanobot_icon.png" alt="nanobot">
    <h1>nanobot</h1>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="agent">Agent</div>
    <div class="tab" data-tab="channels">Channels</div>
    <div class="tab" data-tab="providers">Providers</div>
    <div class="tab" data-tab="tools">Tools</div>
    <div class="tab" data-tab="gateway">Gateway</div>
  </div>

  <form id="configForm">
    <div id="tabAgent" class="tab-panel active"></div>
    <div id="tabChannels" class="tab-panel"></div>
    <div id="tabProviders" class="tab-panel"></div>
    <div id="tabTools" class="tab-panel"></div>
    <div id="tabGateway" class="tab-panel"></div>
  </form>

  <div class="footer">
    <span id="msg" class="msg"></span>
    <button type="button" class="primary" onclick="save()">Save</button>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let config = null;
let original = null;
const msg = document.getElementById('msg');

// ── Init ──────────────────────────────────────────────────────────────────────
async function load() {
  try {
    const div = document.getElementById('tabAgent');
    div.innerHTML = '<div class="loading">Loading...</div>';
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 8000);
    const res = await fetch('/api/config', { signal: controller.signal });
    clearTimeout(timer);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    config = await res.json();
    original = JSON.parse(JSON.stringify(config));
    renderAll();
  } catch(e) {
    document.getElementById('tabAgent').innerHTML =
      '<div class="error">Failed to load config: ' + e.name + ' ' + e.message + '</div>';
  }
}

// ── Tab switching ─────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab' + capitalize(tab.dataset.tab)).classList.add('active');
  });
});
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ── Render all tabs ───────────────────────────────────────────────────────────
function renderAll() {
  renderAgent();
  renderChannels();
  renderProviders();
  renderTools();
  renderGateway();
}

// ── Agent ──────────────────────────────────────────────────────────────────────
const TIMEZONES = [
  'UTC','Asia/Shanghai','Asia/Hong_Kong','Asia/Tokyo','Asia/Seoul',
  'America/New_York','America/Los_Angeles','America/Chicago',
  'Europe/London','Europe/Paris','Europe/Berlin','Australia/Sydney',
];

function renderAgent() {
  const a = config.agents.defaults;
  const tab = document.getElementById('tabAgent');
  tab.innerHTML = `
    <div class="card">
      <div class="card-header">AI Model</div>
      ${selectField('provider', 'Provider', a.provider, 'agents.defaults.provider', [
        {v:'openai',l:'OpenAI'},
        {v:'anthropic',l:'Anthropic'},
        {v:'deepseek',l:'DeepSeek'},
        {v:'minimax',l:'Minimax (OpenAI兼容)'},
        {v:'minimax_anthropic',l:'Minimax (Anthropic兼容)'},
        {v:'minimax_cn',l:'Minimax CN (OpenAI兼容)'},
        {v:'minimax_anthropic_cn',l:'Minimax CN (Anthropic兼容)'},
        {v:'moonshot',l:'Moonshot'},
        {v:'gemini',l:'Gemini'},
        {v:'ollama',l:'Ollama'},
        {v:'azure_openai',l:'Azure OpenAI'},
        {v:'openrouter',l:'OpenRouter'},
        {v:'dashscope',l:'DashScope'},
        {v:'zhipu',l:'Zhipu'},
        {v:'groq',l:'Groq'},
        {v:'mistral',l:'Mistral'},
        {v:'stepfun',l:'Stepfun'},
        {v:'qianfan',l:'Qianfan'},
        {v:'custom',l:'Custom'},
        {v:'vllm',l:'vLLM'},
        {v:'lm_studio',l:'LM Studio'},
        {v:'ovms',l:'OVMS'},
        {v:'siliconflow',l:'SiliconFlow'},
        {v:'volcengine',l:'Volcengine'},
        {v:'byteplus',l:'BytePlus'},
        {v:'xiaomi_mimo',l:'Xiaomi MiMo'},
        {v:'aihubmix',l:'AIHubMix'},
      ], 'onProviderChange()')}
      ${selectField('model', 'Model', a.model, 'agents.defaults.model', [], 'onModelChange()')}
      <div class="row" id="model-loading-row" style="display:none"><label></label><span class="hint">Loading models...</span></div>
      <div class="row" id="model-error-row" style="display:none"><label"></label><span class="hint" style="color:#dc2626">Failed to load models</span></div>
      ${field('max_tokens', 'Max Tokens', a.max_tokens, 'number', 'agents.defaults.max_tokens')}
      ${field('temperature', 'Temperature', a.temperature, 'number', 'agents.defaults.temperature')}
      ${field('max_tool_iterations', 'Max Tool Iterations', a.max_tool_iterations, 'number', 'agents.defaults.max_tool_iterations')}
      ${field('context_window_tokens', 'Context Window (tokens)', a.context_window_tokens, 'number', 'agents.defaults.context_window_tokens')}
    </div>
    <div class="card">
      <div class="card-header">Session</div>
      ${selectField('timezone', 'Timezone', a.timezone, 'agents.defaults.timezone', TIMEZONES.map(t => ({v:t,l:t})))}
      ${field('unified_session', 'Unified Session', a.unified_session, 'checkbox', 'agents.defaults.unified_session')}
      ${field('disabled_skills', 'Disabled Skills', Array.isArray(a.disabled_skills) ? a.disabled_skills.join(', ') : '', 'text', 'agents.defaults.disabled_skills')}
      <div class="row"><label></label><span class="hint">Comma-separated skill names</span></div>
    </div>
    <div class="card">
      <div class="card-header">Dream</div>
      ${field('model_override', 'Model Override', a.dream.model_override || '', 'text', 'agents.defaults.dream.model_override')}
      ${field('interval_h', 'Interval (h)', a.dream.interval_h, 'number', 'agents.defaults.dream.interval_h')}
      ${field('max_batch_size', 'Max Batch Size', a.dream.max_batch_size, 'number', 'agents.defaults.dream.max_batch_size')}
    </div>
  `;
  loadModelsForProvider(a.provider, a.model);
}

async function onProviderChange() {
  const provider = document.getElementById('agents_defaults_provider').value;
  console.log('onProviderChange', provider);
  await loadModelsForProvider(provider, '');
}

async function onModelChange() {
  // model selected — nothing extra needed
}

async function loadModelsForProvider(provider, currentModel) {
  const loadingRow = document.getElementById('model-loading-row');
  const errorRow = document.getElementById('model-error-row');
  const select = document.getElementById('agents_defaults_model');
  console.log('loadModelsForProvider called', {provider, currentModel, selectExists: !!select, loadingRowExists: !!loadingRow});
  if (loadingRow) loadingRow.style.display = '';
  if (errorRow) errorRow.style.display = 'none';
  if (select) select.disabled = true;
  try {
    const url = '/api/provider-models?provider=' + encodeURIComponent(provider);
    console.log('Fetching:', url);
    const res = await fetch(url);
    console.log('Fetch done', res.status, res.ok);
    const data = await res.json();
    console.log('Data:', data);
    const models = data.models || [];
    if (!select) return;
    select.innerHTML = '';
    if (models.length === 0) {
      select.innerHTML = '<option value="">No models (enter manually)</option>';
      select.appendChild(makeOption(currentModel, currentModel));
    } else {
      models.forEach(m => select.appendChild(makeOption(m, m)));
      select.value = currentModel;
    }
  } catch(e) {
    console.error('loadModels failed', e);
    if (select) select.innerHTML = '<option value="">Failed to load</option>';
    if (errorRow) errorRow.style.display = '';
  } finally {
    if (loadingRow) loadingRow.style.display = 'none';
    if (select) select.disabled = false;
  }
}

function makeOption(value, label) {
  const opt = document.createElement('option');
  opt.value = value;
  opt.textContent = label;
  return opt;
}

function selectField(id, label, value, path, opts, onchange) {
  const pathId = path.replace(/\./g, '_').replace(/\[/g, '_').replace(/\]/g, '_');
  const onch = onchange ? ` onchange="${onchange}"` : '';
  const options = (opts || []).map(o => `<option value="${o.v}" ${value == o.v ? 'selected' : ''}>${o.l}</option>`).join('');
  return `<div class="row"><label>${label}</label><div class="field"><select id="${pathId}" data-path="${path}"${onch}>${options}</select></div></div>`;
}

// ── Channels ───────────────────────────────────────────────────────────────────
// Select-type fields per channel
const SELECT_FIELDS = {
  dingtalk: {},
  discord: { group_policy: ['open','mention'] },
  email: {},
  feishu: {},
  mochat: { reply_delay_mode: ['non-mention','always'] },
  msteams: {},
  qq: { msg_format: ['plain','json'] },
  slack: { mode: ['socket','webhook'], group_policy: ['mention','open'] },
  telegram: { group_policy: ['mention','open'] },
  wecom: {},
  weixin: {},
  whatsapp: { group_policy: ['open','mention'] },
  websocket: {},
};

// Password fields (should not reveal actual value)
const SECRET_FIELDS = new Set([
  'token','app_secret','client_secret','api_key','password','proxy_password',
  'bot_token','app_token','smtp_password','imap_password','bridge_token',
  'claw_token',
]);

function renderChannels() {
  const tab = document.getElementById('tabChannels');
  const channels = config.channels || {};
  let html = '';
  for (const [name, ch] of Object.entries(channels)) {
    if (!ch || typeof ch !== 'object') continue;
    const enabled = !!ch.enabled;
    const fieldKeys = Object.keys(ch).filter(k => k !== 'bots');
    html += `<div class="card channel-card">
      <div class="channel-header" onclick="toggleChannel('${name}')">
        <span>${name}</span>
        <span class="badge ${enabled ? 'enabled' : ''}">${enabled ? 'ON' : 'OFF'}</span>
      </div>
      <div class="channel-body" id="ch-${name}">
        ${fieldKeys.map(k => renderChannelField(name, k, ch[k])).join('')}
        ${Array.isArray(ch.bots) ? `
          <div class="group-title">Bots <button type="button" onclick="addBot('${name}')" style="font-size:0.7rem;padding:0.1rem 0.4rem;margin-left:0.5rem">+ Add</button></div>
          <div id="bots-${name}">
          ${ch.bots.map((bot, i) => botRow(name, bot, i)).join('')}
          </div>
        ` : ''}
      </div>
    </div>`;
  }
  tab.innerHTML = html;
}

function renderChannelField(chName, key, value) {
  const path = `channels.${chName}.${key}`;
  const id = `ch_${chName}_${key}`;
  if (typeof value === 'boolean') {
    return `<div class="row"><label>${key}</label><div class="field"><label class="toggle"><input type="checkbox" id="${id}" data-path="${path}" ${value ? 'checked' : ''}><span class="slider"></span></label></div></div>`;
  }
  const selects = SELECT_FIELDS[chName] || {};
  if (selects[key]) {
    const opts = selects[key];
    const selOpts = opts.map(o => `<option value="${o}" ${value == o ? 'selected' : ''}>${o}</option>`).join('');
    return `<div class="row"><label>${key}</label><div class="field"><select id="${id}" data-path="${path}">${selOpts}</select></div></div>`;
  }
  if (typeof value === 'number') {
    return `<div class="row"><label>${key}</label><div class="field"><input type="number" id="${id}" data-path="${path}" value="${value}"></div></div>`;
  }
  const type = SECRET_FIELDS.has(key) ? 'password' : 'text';
  const displayVal = (value === null || value === undefined) ? '' : String(value);
  return `<div class="row"><label>${key}</label><div class="field"><input type="${type}" id="${id}" data-path="${path}" value="${esc(displayVal)}"></div></div>`;
}

function botRow(name, bot, i) {
  if (!bot || typeof bot !== 'object') return '';
  const keys = Object.keys(bot);
  return `<div class="sub-row" style="position:relative;padding-top:0.5rem;border-top:1px dashed #e5e7eb;margin-top:0.5rem">
    <button type="button" onclick="removeBot('${name}',${i})" style="position:absolute;right:0;top:0;font-size:0.7rem;padding:0.1rem 0.3rem;color:#dc2626;border-color:#dc2626">✕</button>
    ${keys.filter(k => bot[k] !== undefined).map(k =>
      typeof bot[k] === 'boolean'
        ? `<div class="row"><label>${k}</label><div class="field"><label class="toggle"><input type="checkbox" id="bot_${i}_${k}" data-path="channels.${name}.bots.${i}.${k}" ${bot[k] ? 'checked' : ''}><span class="slider"></span></label></div></div>`
        : `<div class="row"><label>${k}</label><div class="field"><input type="${SECRET_FIELDS.has(k) ? 'password' : 'text'}" id="bot_${i}_${k}" data-path="channels.${name}.bots.${i}.${k}" value="${esc(String(bot[k] ?? ''))}"></div></div>`
    ).join('')}
  </div>`;
}

function addBot(name) {
  if (!config.channels[name]) config.channels[name] = {};
  if (!Array.isArray(config.channels[name].bots)) config.channels[name].bots = [];
  config.channels[name].bots.push({name:'',appId:'',appSecret:'',domain:'feishu'});
  renderChannels();
  document.getElementById('ch-' + name).classList.add('open');
}

function removeBot(name, i) {
  config.channels[name].bots.splice(i, 1);
  renderChannels();
}

function toggleChannel(name) {
  document.getElementById('ch-' + name).classList.toggle('open');
}

// ── Providers ─────────────────────────────────────────────────────────────────
function renderProviders() {
  const tab = document.getElementById('tabProviders');
  const known = ['openai','anthropic','deepseek','groq',
    'minimax_anthropic_cn','minimax_cn','minimax_anthropic','minimax',
    'moonshot','gemini','ollama','azure_openai','openrouter','dashscope','zhipu',
    'mistral','stepfun','qianfan','custom','vllm','lm_studio','ovms',
    'siliconflow','volcengine','wecom'];
  let html = '<div class="provider-grid">';
  for (const name of known) {
    const p = config.providers[name];
    if (!p) continue;
    const hasKey = p.api_key && p.api_key.length > 0;
    html += `
    <div class="card">
      <div class="card-header">${name} ${hasKey ? '<span class="badge enabled">KEY</span>' : ''}</div>
      ${field('api_key_'+name, 'API Key', p.api_key || '', 'text', `providers.${name}.api_key`)}
      ${field('api_base_'+name, 'API Base', p.api_base || '', 'text', `providers.${name}.api_base`)}
    </div>`;
  }
  html += '</div>';
  tab.innerHTML = html;
}

// ── Tools ─────────────────────────────────────────────────────────────────────
function renderTools() {
  const t = config.tools;
  const tab = document.getElementById('tabTools');
  tab.innerHTML = `
    <div class="card">
      <div class="card-header">Web</div>
      ${field('enable', 'Enabled', t.web.enable, 'checkbox', 'tools.web.enable')}
      ${field('provider', 'Search Provider', t.web.search?.provider || '', 'select', 'tools.web.search.provider', [
        {v:'duckduckgo',l:'DuckDuckGo'},{v:'google',l:'Google'},{v:'bing',l:'Bing'},
      ])}
      ${field('apiKey', 'Search API Key', t.web.search?.apiKey || '', 'password', 'tools.web.search.apiKey')}
    </div>
    <div class="card">
      <div class="card-header">Exec</div>
      ${field('enable', 'Enabled', t.exec?.enable, 'checkbox', 'tools.exec.enable')}
      ${field('timeout', 'Timeout (s)', t.exec?.timeout || 1200, 'number', 'tools.exec.timeout')}
      ${field('sandbox', 'Sandbox', t.exec?.sandbox || '', 'text', 'tools.exec.sandbox')}
      ${field('restrict_to_workspace', 'Restrict to Workspace', t.restrict_to_workspace, 'checkbox', 'tools.restrict_to_workspace')}
    </div>
  `;
}

// ── Gateway ───────────────────────────────────────────────────────────────────
function renderGateway() {
  const g = config.gateway;
  const tab = document.getElementById('tabGateway');
  tab.innerHTML = `
    <div class="card">
      <div class="card-header">Network</div>
      ${field('host', 'Host', g.host, 'text', 'gateway.host')}
      ${field('port', 'Port', g.port, 'number', 'gateway.port')}
    </div>
    <div class="card">
      <div class="card-header">Heartbeat</div>
      ${field('enabled', 'Enabled', g.heartbeat?.enabled, 'checkbox', 'gateway.heartbeat.enabled')}
      ${field('interval_s', 'Interval (s)', g.heartbeat?.interval_s || 1800, 'number', 'gateway.heartbeat.interval_s')}
    </div>
    <div class="card">
      <div class="card-header">Logging</div>
      ${field('level', 'Level', config.logging?.level || 'INFO', 'select', 'logging.level', [
        {v:'DEBUG',l:'DEBUG'},{v:'INFO',l:'INFO'},{v:'WARNING',l:'WARNING'},{v:'ERROR',l:'ERROR'},
      ])}
    </div>
  `;
}

// ── Field helpers ─────────────────────────────────────────────────────────────
function field(id, label, value, type, path, opts) {
  const pathId = path.replace(/\./g, '_').replace(/\[/g, '_').replace(/\]/g, '_');
  if (type === 'checkbox') {
    const checked = value ? 'checked' : '';
    return `<div class="row"><label>${label}</label><div class="field"><label class="toggle"><input type="checkbox" id="${pathId}" data-path="${path}" ${checked}><span class="slider"></span></label></div></div>`;
  }
  if (type === 'select') {
    const options = (opts || []).map(o => `<option value="${o.v}" ${value == o.v ? 'selected' : ''}>${o.l}</option>`).join('');
    return `<div class="row"><label>${label}</label><div class="field"><select id="${pathId}" data-path="${path}">${options}</select></div></div>`;
  }
  const val = (value === null || value === undefined) ? '' : esc(String(value));
  const step = type === 'number' ? ' step="any"' : '';
  return `<div class="row"><label>${label}</label><div class="field"><input type="${type}" id="${pathId}" data-path="${path}" value="${val}"${step}></div></div>`;
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Build nested config from flat path edits ──────────────────────────────────
function applyEdit(obj, path, value) {
  const parts = path.split('.');
  let cur = obj;
  let i = 0;
  while (i < parts.length - 1) {
    const key = parts[i];
    const nextKey = parts[i + 1];
    if (/^\d+$/.test(nextKey)) {
      // Array index: ensure element exists as object
      if (!Array.isArray(cur[key])) cur[key] = [];
      const idx = parseInt(nextKey, 10);
      if (cur[key][idx] === undefined) cur[key][idx] = {};
      cur = cur[key][idx];
      i += 2; // skip both key and index
    } else {
      if (typeof cur[key] !== 'object' || cur[key] === null) cur[key] = {};
      cur = cur[key];
      i++;
    }
  }
  const last = parts[i];
  // disabled_skills is stored as comma-separated string but config needs array
  if (last === 'disabled_skills' && typeof value === 'string' && value.includes(',')) {
    value = value.split(',').map(s => s.trim()).filter(Boolean);
  }
  if (value === '') cur[last] = '';
  else if (value === 'true') cur[last] = true;
  else if (value === 'false') cur[last] = false;
  else if (!isNaN(value) && value !== '') cur[last] = Number(value);
  else cur[last] = value;
}

// ── Save ───────────────────────────────────────────────────────────────────────
async function save() {
  const btn = document.querySelector('.footer button');
  btn.disabled = true;
  msg.textContent = '';
  msg.className = 'msg';

  // Collect all edits from form
  const edited = JSON.parse(JSON.stringify(config));
  document.querySelectorAll('input[data-path], select[data-path]').forEach(el => {
    let val = el.type === 'checkbox' ? el.checked : el.value;
    applyEdit(edited, el.dataset.path, val);
  });

  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 8000);
    const res = await fetch('/api/config', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(edited),
      signal: controller.signal,
    });
    clearTimeout(timer);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'HTTP ' + res.status);
    config = edited;
    original = JSON.parse(JSON.stringify(config));
    msg.className = 'msg ok';
    msg.textContent = 'Saved. Restart nanobot to apply.';
  } catch(e) {
    msg.className = 'msg err';
    msg.textContent = e.name === 'AbortError' ? 'Request timed out' : e.message;
  } finally {
    btn.disabled = false;
  }
}

// ── Start ─────────────────────────────────────────────────────────────────────
load();
</script>
